name: .NET release

on:
  push:
    tags:
      - "v*" # Triggers only on version tags (e.g., v1.0.0)

jobs:
  build-and-pack:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # Required for Trusted Publishing to NuGet
    env:
      DOTNET_CONFIGURATION: Release

    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: 0 # Essential for correct versioning

    - name: Setup Runtimes, Caching
      uses: ./.github/actions/setup-runtimes-caching
      with:
        name: "Release"

    - name: Extract Version from Tag
      id: get_version
      # Removes 'v' prefix from tag (v1.0.0 -> 1.0.0)
      run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
      shell: bash

    - name: Build and Pack
      # We combine build and pack for efficiency. 
      # Version is passed explicitly to override eng/Versions.props
      run: >
        dotnet pack 
        --configuration ${{ env.DOTNET_CONFIGURATION }} 
        --output artifacts
        -p:Version=${{ steps.get_version.outputs.VERSION }}
        -p:ContinuousIntegrationBuild=true

    - name: Run Tests
      # Quick check before publishing to ensure the release is stable
      run: dotnet test --configuration ${{ env.DOTNET_CONFIGURATION }} --no-build

    - name: Upload Artifacts
      uses: actions/upload-artifact@v7
      with:
        name: nuget-packages
        path: artifacts/*.nupkg

  github-release:
    needs: build-and-pack
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to create a Release entry
    steps:
      - name: Download packages
        uses: actions/download-artifact@v8
        with:
          name: nuget-packages

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: ./*.nupkg
          generate_release_notes: true # Automated changelog from commits

  publish-nuget:
    needs: build-and-pack
    runs-on: ubuntu-latest
    # Recommended: use a specific environment for approvals
    environment: production 
    steps:
      - name: Download packages
        uses: actions/download-artifact@v8
        with:
          name: nuget-packages

      - name: Publish to NuGet
        # If using Trusted Publishing, API Key is not needed. 
        # Otherwise, keep the secret as a fallback.
        run: >
          dotnet nuget push ./*.nupkg 
          --source https://api.nuget.org/v3/index.json 
          --api-key ${{ secrets.NUGET_API_KEY }} 
          --skip-duplicate
