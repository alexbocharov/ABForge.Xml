name: Test

on:
  workflow_call:
    inputs:
      runs_on:
        required: true
        type: string
      configuration:
        required: false
        type: string
        default: 'Release'

jobs:
  test:
    runs-on: ${{ inputs.runs_on }}
    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Setup Runtimes, Caching
      uses: ./.github/actions/setup-runtimes-caching
      with:
        name: "Test"

    - name: Run tests
      # We removed --no-restore and --no-build to ensure project.assets.json 
      # is generated on the fresh CI runner since artifacts/obj is gitignored.
      run: >-
        dotnet test 
        --configuration ${{ inputs.configuration }}
        --logger "GitHubActions;summary.includePassedTests=true;summary.includeSkippedTests=true"
        --logger "trx;LogFileName=test-results.trx"
        --blame-crash
        --blame-hang-timeout 5m
        --results-directory testresults
        --collect "XPlat Code Coverage"
        -- RunConfiguration.CollectSourceInformation=true

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-${{ inputs.runs_on }}
        path: testresults/**/*.trx

    - name: Upload coverage to Codecov
      if: always()
      uses: codecov/codecov-action@v6
      with:
        # Token is optional for public repos but recommended for ABForge stability
        token: ${{ secrets.CODECOV_TOKEN }} 
        fail_ci_if_error: false
